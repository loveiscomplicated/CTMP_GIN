device: null # if null, it automatically sets the available device. (cuda | mps | cpu)
            # it is often better to use cpu due to recurrent unit.
edge:
  is_mi_based: True # if 0, it generates fully connected edge index.
  n_neighbors: 3 # NOTE: cv result of n_neighbors: 3
  top_k: 12
  threshold: 0.005
  pruning_ratio: 0.5
  return_edge_attr: False # CAUTION: potential error when set to True
  mi_cached: True
  cache_path: None

model:
  name: gin_gru_2_points
  params:
    embedding_dim: 64
    gin_hidden_channel: 64
    train_eps: True
    gin_layers: 3
    gru_hidden_channel: 96
    dropout_p: 0.22212524009656695
    gin_layer_out_dropout_p: 0.1364804557576065
    gru_layer_out_dropout_p: 0.4824231060253208
    max_los_norm: 37.0  # LOS feature scaling divisor

train:
  batch_size: 64
  learning_rate: 0.00033657148286420817 # optimizer learning rate
  epochs: 1000 # 
  seed: 1
  binary: True
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  optimizer: "adam"
  num_workers: 15
  lr_scheduler_patience: 5
  early_stopping_patience: 10
  decision_threshold: 0.5
  cv: False
  n_folds: 5