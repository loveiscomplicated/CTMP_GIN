device: null # if null, it automatically sets the available device. (cuda | mps | cpu)

edge:
  is_mi_based: True # if 0, it generates fully connected edge index.
  n_neighbors: 5
  top_k: 9
  threshold: 0.0
  pruning_ratio: 0.5
  return_edge_attr: False # CAUTION: potential error when set to True
  mi_cached: False

model:
  name: ctmp_gin
  params:
    embedding_dim: 32
    gin_hidden_channel: 96
    gin_1_layers: 2
    gin_hidden_channel_2: 32
    gin_2_layers: 1
    train_eps: False
    los_embedding_dim: 8
    gate_hidden_ch: 256 # Hidden_dim of GatedFusion, If set to None, it defaults to in_dim, which is gin_hidden_channel * 3
    dropout_p: 0.40109849037701983

train:
  batch_size: 512
  learning_rate: 0.0005362853964441848 # optimizer learning rate
  epochs: 100
  seed: 1
  binary: True
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 4
  optimizer: "adam"
  weight_decay: 2.575e-05
  lr_scheduler_patience: 8
  early_stopping_patience: 10
  decision_threshold: 0.5

  ig_label: False # include Neutral labels for Integrated Gradients Method
                  # Must set to False except using Integrated Gradients
  cv: True
  n_folds: 5
